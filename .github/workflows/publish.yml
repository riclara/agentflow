name: Publish to npm

on:
  release:
    types:
      - published

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Set up npm for trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        run: |
          TAG_NAME="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(npm pkg get version | tr -d '"')"

          if [ "$TAG_NAME" != "$PACKAGE_VERSION" ]; then
            echo "Release tag v$PACKAGE_VERSION expected, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Publish package
        run: npm publish
